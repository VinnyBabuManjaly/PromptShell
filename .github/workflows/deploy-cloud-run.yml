name: Deploy to Cloud Run (Manual)

# This workflow is for manual re-deploys only — e.g. to rotate secrets,
# redeploy after a config change, or recover from an incident without
# cutting a new release.
#
# Normal deployments happen automatically via release.yml when a version
# tag (v*.*.*) is pushed. Use this only when you need to deploy outside
# of a release.
#
# Required repository secrets:
#   GCP_PROJECT_ID  — GCP project ID
#   GCP_SA_KEY      — Service account JSON key, base64-encoded
#   GEMINI_API_KEY  — Google AI Studio API key
#
# See docs/deployment.md for setup instructions.

on:
  workflow_dispatch:
    inputs:
      region:
        description: Cloud Run region
        required: false
        default: us-central1
      image_tag:
        description: Image tag to deploy (default: latest)
        required: false
        default: latest

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: prompt-shell-enhancer
  REGION: ${{ github.event.inputs.region }}
  IMAGE_TAG: ${{ github.event.inputs.image_tag }}

jobs:
  deploy:
    name: Manual Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Build container image
        run: |
          gcloud builds submit \
            --tag "gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ env.IMAGE_TAG }}" \
            --project "${{ env.PROJECT_ID }}" \
            ./cloud_run_service/

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ env.SERVICE_NAME }}" \
            --image "gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ env.IMAGE_TAG }}" \
            --platform managed \
            --region "${{ env.REGION }}" \
            --allow-unauthenticated \
            --set-env-vars "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --timeout 30s \
            --project "${{ env.PROJECT_ID }}"

      - name: Get service URL and verify health
        run: |
          URL=$(gcloud run services describe "${{ env.SERVICE_NAME }}" \
            --region "${{ env.REGION }}" \
            --project "${{ env.PROJECT_ID }}" \
            --format "value(status.url)")
          echo "Service URL: $URL"
          STATUS=$(curl -sf "$URL/health" | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
          if [ "$STATUS" != "ok" ]; then
            echo "Health check failed — got: $STATUS"
            exit 1
          fi
          echo "Health check passed."
