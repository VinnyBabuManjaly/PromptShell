name: Deploy to Cloud Run

# Trigger on pushes to main that touch the Cloud Run service code,
# or manually via workflow_dispatch.
on:
  push:
    branches: [main]
    paths:
      - cloud_run_service/**
      - cloudbuild.yaml
      - deploy.sh
  workflow_dispatch:
    inputs:
      region:
        description: Cloud Run region
        required: false
        default: us-central1

permissions:
  contents: read
  id-token: write   # Required for Workload Identity Federation

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: prompt-shell-enhancer
  REGION: ${{ github.event.inputs.region || 'us-central1' }}
  IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/prompt-shell-enhancer

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      # Authenticate to Google Cloud using a service account key stored
      # as the GCP_SA_KEY secret (JSON key file, base64-encoded).
      # To use Workload Identity Federation instead, replace this step with
      # google-github-actions/auth@v2 using workload_identity_provider.
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Enable required GCP APIs
        run: |
          gcloud services enable \
            run.googleapis.com \
            cloudbuild.googleapis.com \
            containerregistry.googleapis.com \
            --project "$PROJECT_ID"

      - name: Build container image
        run: |
          gcloud builds submit \
            --tag "$IMAGE" \
            --project "$PROJECT_ID" \
            ./cloud_run_service/

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE_NAME" \
            --image "$IMAGE" \
            --platform managed \
            --region "$REGION" \
            --allow-unauthenticated \
            --set-env-vars "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --timeout 30s \
            --project "$PROJECT_ID"

      - name: Print service URL
        run: |
          URL=$(gcloud run services describe "$SERVICE_NAME" \
            --region "$REGION" \
            --project "$PROJECT_ID" \
            --format "value(status.url)")
          echo "Service URL: $URL"
          echo "Health check: $(curl -sf $URL/health || echo 'FAILED')"
