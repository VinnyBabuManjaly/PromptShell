name: Release & Publish

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

env:
  UV_CACHE_DIR: /tmp/.uv-cache

jobs:
  # ──────────────────────────────────────────────────
  # Validate the tag matches pyproject.toml version
  # ──────────────────────────────────────────────────
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release version: $TAG"

      - name: Verify tag matches pyproject.toml
        run: |
          PKG_VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) does not match pyproject.toml ($PKG_VERSION)"
            exit 1
          fi
          echo "Version match confirmed: $TAG_VERSION"

  # ──────────────────────────────────────────────────
  # Run full CI before releasing
  # ──────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [validate]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libportaudio2

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

  # ──────────────────────────────────────────────────
  # Build distribution packages
  # ──────────────────────────────────────────────────
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Build sdist and wheel
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  # ──────────────────────────────────────────────────
  # Publish to PyPI (trusted publisher via OIDC)
  # ──────────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build]
    environment:
      name: pypi
      url: https://pypi.org/project/prompt-shell/
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses trusted publishing (OIDC) — no API token needed
        # Configure at: https://pypi.org/manage/project/.../settings/publishing/

  # ──────────────────────────────────────────────────
  # Create GitHub Release with auto-generated notes
  # ──────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build, publish-pypi]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Generate changelog
        id: changelog
        run: |
          # Get the previous tag
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
          CURRENT_TAG="${GITHUB_REF#refs/tags/}"

          echo "## What's Changed" > changelog.md
          echo "" >> changelog.md

          if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$CURRENT_TAG" ]; then
            git log "${PREV_TAG}..${CURRENT_TAG}" --pretty=format:"- %s (%h)" --no-merges >> changelog.md
          else
            git log --pretty=format:"- %s (%h)" --no-merges -20 >> changelog.md
          fi

          echo "" >> changelog.md
          echo "" >> changelog.md
          echo "## Installation" >> changelog.md
          echo "" >> changelog.md
          echo '```bash' >> changelog.md
          echo "pip install prompt-shell==${{ needs.validate.outputs.version || github.ref_name }}" >> changelog.md
          echo '```' >> changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: changelog.md
          files: dist/*
          generate_release_notes: true
          make_latest: true

  # ──────────────────────────────────────────────────
  # Deploy Cloud Run enhancement service to GCP
  # Runs after PyPI publish succeeds.
  # Required secrets: GCP_PROJECT_ID, GCP_SA_KEY, GEMINI_API_KEY
  # ──────────────────────────────────────────────────
  deploy-cloud-run:
    name: Deploy Cloud Run
    runs-on: ubuntu-latest
    needs: [publish-pypi]
    permissions:
      contents: read
      id-token: write
    environment:
      name: cloud-run
      url: ${{ steps.service-url.outputs.url }}
    steps:
      - uses: actions/checkout@v6

      # Authenticate using a service account key stored as a base64-encoded
      # JSON in the GCP_SA_KEY secret.
      # See docs/deployment.md for how to create and encode the key.
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Enable required GCP APIs
        run: |
          gcloud services enable \
            run.googleapis.com \
            cloudbuild.googleapis.com \
            containerregistry.googleapis.com \
            --project "${{ secrets.GCP_PROJECT_ID }}"

      # Tag the image with the release version (e.g. gcr.io/.../prompt-shell-enhancer:v0.2.0)
      # so each release has a distinct, rollback-able image.
      - name: Build container image via Cloud Build
        run: |
          gcloud builds submit \
            --tag "gcr.io/${{ secrets.GCP_PROJECT_ID }}/prompt-shell-enhancer:${{ github.ref_name }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            ./cloud_run_service/

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy prompt-shell-enhancer \
            --image "gcr.io/${{ secrets.GCP_PROJECT_ID }}/prompt-shell-enhancer:${{ github.ref_name }}" \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --set-env-vars "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --timeout 30s \
            --project "${{ secrets.GCP_PROJECT_ID }}"

      - name: Get service URL
        id: service-url
        run: |
          URL=$(gcloud run services describe prompt-shell-enhancer \
            --region us-central1 \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --format "value(status.url)")
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Service deployed at: $URL"

      - name: Verify deployment health
        run: |
          URL="${{ steps.service-url.outputs.url }}"
          STATUS=$(curl -sf "$URL/health" | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
          if [ "$STATUS" != "ok" ]; then
            echo "Health check failed — service returned: $STATUS"
            exit 1
          fi
          echo "Health check passed: $URL/health -> $STATUS"

  # ──────────────────────────────────────────────────
  # Build & Push Docker Image
  # ──────────────────────────────────────────────────
  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
