# Terminal
terminal:
  backend: auto                # auto | shell_hook | tmux | iterm2 | generic
  screen_buffer_lines: 100
  poll_interval_ms: 2000

# Voice
voice:
  engine: whisper_local        # whisper_local | whisper_api | apple_speech
  whisper_model: base.en       # tiny.en | base.en | small.en
  silence_threshold_sec: 1.0
  max_duration_sec: 30
  vad_aggressiveness: 2

# LLM / Enhancement
# Default: Gemini 2.0 Flash via Google Cloud Run (free tier, ~$0/month at demo scale)
# Fallback: ollama (local, offline) if cloud_run_url is not set or service is unreachable
llm:
  provider: gemini             # gemini | ollama | openai | anthropic
  model: gemini-2.0-flash
  api_key: ${GEMINI_API_KEY}   # Google AI Studio key — https://aistudio.google.com/
  cloud_run_url: ${CLOUD_RUN_URL}  # URL of deployed Cloud Run service
  temperature: 0.3
  max_tokens: 500

# Offline / alternative LLM providers (used when provider != gemini)
# llm:
#   provider: ollama
#   model: llama3.2:8b
#
# llm:
#   provider: openai
#   model: gpt-4o-mini
#   api_key: ${OPENAI_API_KEY}
#
# llm:
#   provider: anthropic
#   model: claude-3.5-haiku
#   api_key: ${ANTHROPIC_API_KEY}

# Delivery
delivery:
  method: clipboard            # clipboard | iterm_paste | file
  show_notification: true
  notification_preview_chars: 100
  # output_file: ~/.prompt-shell/last_prompt.txt  # used when method: file

# Hotkeys
hotkeys:
  activate: ctrl+shift+p
  context_only: ctrl+shift+l
  re_enhance: ctrl+shift+r
  cancel: escape
